data:
  start_date: "1950-01-01"
  end_date: null

# Minimal ETF universe used by unit tests. Expand in the pipelines repo.
assets:
  etfs:
    - SPY
    - GLD
    - TLT

fred:
  # Note: api_key is injected at runtime by trading_crab_lib.config.load()
  api_key: null
  series:
    # --- core macro series (examples) ---
    GDP:
      name: fred_gdp
      shift: true
    CPIAUCSL:
      name: fred_cpi
      shift: false

    # --- additional series enforced by tests/unit/test_fred_series_config.py ---
    VIXCLS:
      name: fred_vix
      shift: false
    UNRATE:
      name: fred_unrate
      shift: false
    M2SL:
      name: fred_m2sl
      shift: false
    M2NS:
      name: fred_m2ns
      shift: false
    GS2:
      name: fred_gs2
      shift: false
    T10Y2Y:
      name: fred_t10y2y
      shift: false
    T10Y3M:
      name: fred_t10y3m
      shift: false

# Minimal feature config for trading_crab_lib.transforms.engineer_all().
# Expand this in your pipelines repo for full production runs.
features:
  derivative_window: 5
  # Log transforms are optional; missing columns are skipped safely.
  log_columns: []
  # When empty, selection is a no-op (features will be whatever survives step 4-5).
  initial_features: []
  clustering_features: []

# Minimal clustering config for pipelines/03_cluster.py.
# Expand/tune in your pipelines repo for production runs.
clustering:
  n_pca_components: 5
  n_clusters_search: 8
  k_cap: 8
  balanced_k: 5
  random_state: 42

