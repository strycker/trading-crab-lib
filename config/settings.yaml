# ─────────────────────────────────────────────────────────────────────────────
#  Market Regime Pipeline — Global Settings
#  Edit values here; never hardcode them in source files.
# ─────────────────────────────────────────────────────────────────────────────

data:
  start_date: "1950-01-01"
  end_date:   null            # null → use today's date at runtime
  frequency:  "Q"             # quarterly resampling target
  drop_incomplete_tail: true

# ── FRED series ───────────────────────────────────────────────────────────────
# shift: true → series is lagged one quarter to account for publication delay.
fred:
  # api_key is injected at runtime by trading_crab_lib.config.load()
  api_key: null
  series:
    GDP:      { name: "fred_gdp",      shift: true  }
    GNP:      { name: "fred_gnp",      shift: true  }
    BAA:      { name: "fred_baa",      shift: false }
    AAA:      { name: "fred_aaa",      shift: false }
    CPIAUCSL: { name: "fred_cpi",      shift: false }
    GS10:     { name: "fred_gs10",     shift: false }
    TB3MS:    { name: "fred_tb3ms",    shift: false }

    # Additional series enforced by tests/unit/test_fred_series_config.py
    VIXCLS:   { name: "fred_vix",      shift: false }
    UNRATE:   { name: "fred_unrate",   shift: false }
    M2SL:     { name: "fred_m2sl",     shift: false }
    M2NS:     { name: "fred_m2ns",     shift: false }
    GS2:      { name: "fred_gs2",      shift: false }
    T10Y2Y:   { name: "fred_t10y2y",   shift: false }
    T10Y3M:   { name: "fred_t10y3m",   shift: false }

# ── multpl.com series ─────────────────────────────────────────────────────────
# Each entry: [short_name, description, url, value_type]
multpl:
  datasets:
    - [dividend,  "SP500 Dividend",                  "https://www.multpl.com/s-p-500-dividend/table/by-month",                    num]
    - [div_yield, "SP500 Dividend Yield",            "https://www.multpl.com/s-p-500-dividend-yield/table/by-month",              percent]
    - [sp500,     "SP500 Historical Prices",         "https://www.multpl.com/s-p-500-historical-prices/table/by-month",           num]
    - [sp500_adj, "SP500 Inflation Adjusted Prices", "https://www.multpl.com/inflation-adjusted-s-p-500/table/by-month",          num]
    - [cpi,       "US Consumer Price Index",         "https://www.multpl.com/cpi/table/by-month",                                 num]
    - [gdp,       "US GDP",                          "https://www.multpl.com/us-gdp/table/by-year",                               trillion]
    - [gdp_growth,"US GDP Growth Rate",              "https://www.multpl.com/us-gdp-growth-rate/table/by-quarter",                percent]
    - [us_infl,   "US Inflation Rate",               "https://www.multpl.com/inflation/table/by-month",                           percent]
    - [sp500_pe,  "SP500 PE Ratio",                  "https://www.multpl.com/s-p-500-pe-ratio/table/by-month",                    num]
    - [10yr_ustreas, "US 10 Year Treasury Rate",     "https://www.multpl.com/10-year-treasury-rate/table/by-month",               percent]

# ── Feature engineering ───────────────────────────────────────────────────────
features:
  derivative_window: 5
  log_columns:
    - cpi
    - dividend
    - sp500
    - sp500_adj
    - fred_cpi
    - fred_gdp
    - fred_gnp
    - gdp
  initial_features:
    # Rates/growths
    - 10yr_ustreas
    - gdp_growth
    - sp500_pe
    - us_infl
    - fred_aaa
    - fred_baa
    - fred_gs10
    - fred_tb3ms
    # Levels (and logged levels)
    - log_cpi
    - log_dividend
    - log_sp500
    - log_sp500_adj
    - log_fred_cpi
    - log_fred_gdp
    - log_fred_gnp
    - log_gdp
    # Cross-ratio outputs (if present)
    - credit_spread
    - div_minus_baa
  clustering_features:
    # Keep this conservative for now: allow base levels + first derivatives.
    - 10yr_ustreas
    - 10yr_ustreas_d1
    - gdp_growth
    - gdp_growth_d1
    - sp500_pe
    - sp500_pe_d1
    - us_infl
    - us_infl_d1
    - fred_aaa_d1
    - fred_baa_d1
    - fred_gs10_d1
    - fred_tb3ms_d1
    - log_sp500_d1
    - log_sp500_adj_d1
    - log_cpi_d1
    - log_dividend_d1
    - credit_spread
    - credit_spread_d1
    - div_minus_baa_d1

# ── Clustering ────────────────────────────────────────────────────────────────
clustering:
  n_pca_components:  5
  n_clusters_search: 12
  k_cap:             5
  balanced_k:        5
  random_state:      42

# ── Supervised prediction ─────────────────────────────────────────────────────
prediction:
  test_size: 0.20
  random_state: 42
  n_estimators: 200
  forward_horizons_quarters: [1, 2, 4, 8]
  cv_splits: 5
  dt_max_depth: 8
  rf_max_depth: 12
  use_boosted: true
  boosted_max_depth: 6
  boosted_learning_rate: 0.1
  boosted_n_estimators: 200
  interpret_tree_max_depth: 3
  interpret_top_k_features: 10

# ── Tactics (Step 9) ──────────────────────────────────────────────────────────
tactics:
  # Windows are in quarters (because we work on quarterly returns).
  vol_window: 8
  trend_window: 4
  vol_threshold: 0.20
  trend_threshold: 0.0

# ETF universe (also used by tests). This must be a superset of any tickers
# present in the `asset_prices` checkpoint.
assets:
  etfs:
    - SPY
    - GLD
    - TLT
    - USO
    - QQQ
    - IWM
    - VNQ
    - AGG
    - HYG
    - XLK
    - XLP
    - XLE
    - GDX
    - TIP
    - BIL
    - EDV

